rules:
  - id: typescript_cache
    name: TypeScript Cache
    paths:
      - "~/.cache/typescript"
      - "**/.tsbuildinfo"
    safety: safe
    confidence: 96
    explanation: "TypeScript incremental build cache. Regenerated by tsc on the next compile."
    source:
      name: TypeScript
    regenerates: true
    regenerate_command: "tsc --build"
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: electron_cache
    name: Electron Cache
    paths:
      - "~/.cache/electron"
    safety: safe
    confidence: 97
    explanation: "Electron binary download cache. Re-downloaded by Electron tooling when needed."
    source:
      name: Electron
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - node
      - cache

  - id: node_gyp_cache
    name: node-gyp Cache
    paths:
      - "~/.cache/node-gyp"
      - "~/.node-gyp"
    safety: safe
    confidence: 96
    explanation: "node-gyp headers and build cache. Re-downloaded or rebuilt during native module installs."
    source:
      name: node-gyp
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: turbo_cache
    name: Turborepo Cache
    paths:
      - "~/.turbo/cache"
      - "**/.turbo/cache"
    safety: safe
    confidence: 96
    explanation: "Turborepo task output cache. Recomputed on future task runs."
    source:
      name: Turborepo
    regenerates: true
    regenerate_command: "turbo run build"
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: vite_cache
    name: Vite Cache
    paths:
      - "~/.vite/cache"
      - "~/.cache/vite"
      - "**/node_modules/.vite"
      - "**/.vite/cache"
    safety: safe
    confidence: 97
    explanation: "Vite dependency prebundle and transform caches. Recreated by Vite on the next dev/build run."
    source:
      name: Vite
    regenerates: true
    regenerate_command: "vite"
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: webpack_cache
    name: Webpack Cache
    paths:
      - "~/.cache/webpack"
      - "**/node_modules/.cache/webpack"
    safety: safe
    confidence: 96
    explanation: "Webpack persistent cache. Rebuilt on the next webpack build."
    source:
      name: Webpack
    regenerates: true
    regenerate_command: "webpack"
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: parcel_cache
    name: Parcel Cache
    paths:
      - "~/.parcel-cache"
      - "**/.parcel-cache"
    safety: safe
    confidence: 97
    explanation: "Parcel transform cache. Rebuilt on the next Parcel build."
    source:
      name: Parcel
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - node
      - build_cache

  - id: eslint_prettier_cache
    name: ESLint and Prettier Caches
    paths:
      - "~/.cache/eslint"
      - "~/.cache/prettier"
      - "**/.eslintcache"
    safety: safe
    confidence: 97
    explanation: "Lint and formatter caches. Recreated by ESLint or Prettier as needed."
    source:
      name: ESLint and Prettier
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - node
      - cache

  - id: prisma_cache
    name: Prisma Cache
    paths:
      - "~/.cache/prisma"
    safety: safe
    confidence: 94
    explanation: "Prisma engine binary cache. Re-downloaded by Prisma when clients are generated."
    source:
      name: Prisma
    regenerates: true
    regenerate_command: "prisma generate"
    category: dev_artifacts
    tags:
      - developer
      - node
      - database
      - cache
