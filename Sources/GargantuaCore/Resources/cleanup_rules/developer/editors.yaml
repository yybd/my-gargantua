rules:
  - id: vscode_caches
    name: VS Code Caches
    paths:
      - "~/Library/Caches/com.microsoft.VSCode/Cache"
      - "~/Library/Application Support/Code/Cache"
      - "~/Library/Application Support/Code/CachedData"
      - "~/Library/Application Support/Code/CachedExtensions"
      - "~/Library/Application Support/Code/CachedExtensionVSIXs"
      - "~/Library/Application Support/Code/GPUCache"
      - "~/Library/Application Support/Code/DawnGraphiteCache"
      - "~/Library/Application Support/Code/DawnWebGPUCache"
      - "~/Library/Application Support/Code/Service Worker/CacheStorage"
      - "~/Library/Application Support/Code/Service Worker/ScriptCache"
    safety: safe
    confidence: 95
    explanation: "VS Code runtime, extension-package, GPU, and service-worker caches. Settings and workspace storage are excluded."
    source:
      name: Visual Studio Code
      bundle_id: com.microsoft.VSCode
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - cache

  - id: vscode_logs
    name: VS Code Logs
    paths:
      - "~/Library/Application Support/Code/logs"
    safety: safe
    confidence: 97
    explanation: "VS Code logs. Useful for debugging only and regenerated by the editor."
    source:
      name: Visual Studio Code
      bundle_id: com.microsoft.VSCode
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - logs

  - id: cursor_caches
    name: Cursor Caches
    paths:
      - "~/Library/Caches/Cursor"
      - "~/Library/Application Support/Cursor/CachedData"
      - "~/Library/Application Support/Cursor/CachedExtensionVSIXs"
      - "~/Library/Application Support/Cursor/GPUCache"
      - "~/Library/Application Support/Cursor/DawnGraphiteCache"
      - "~/Library/Application Support/Cursor/DawnWebGPUCache"
      - "~/Library/Application Support/Cursor/Service Worker/CacheStorage"
      - "~/Library/Application Support/Cursor/Service Worker/ScriptCache"
    safety: safe
    confidence: 95
    explanation: "Cursor runtime, extension-package, GPU, and service-worker caches. User settings and workspaces are not matched."
    source:
      name: Cursor
      bundle_id: com.todesktop.230313mzl4w4u92
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - ai
      - cache

  - id: zed_caches
    name: Zed Caches and Logs
    paths:
      - "~/Library/Caches/Zed"
      - "~/Library/Logs/Zed"
    safety: safe
    confidence: 96
    explanation: "Zed editor caches and logs. Recreated by the editor as needed."
    source:
      name: Zed
      bundle_id: dev.zed.Zed
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - cache
      - logs

  - id: copilot_caches
    name: GitHub Copilot Caches
    paths:
      - "~/Library/Caches/copilot"
      - "~/.cache/vscode-ripgrep"
    safety: safe
    confidence: 95
    explanation: "GitHub Copilot and VS Code ripgrep helper caches. Recreated by editor extensions."
    source:
      name: GitHub Copilot
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - ai
      - cache

  - id: jetbrains_logs
    name: JetBrains IDE Logs
    paths:
      - "~/Library/Logs/JetBrains"
    safety: safe
    confidence: 97
    explanation: "JetBrains IDE logs. IDE indexes and settings are deliberately not matched."
    source:
      name: JetBrains
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - logs

  - id: sublime_text_cache
    name: Sublime Text Cache
    paths:
      - "~/Library/Caches/com.sublimetext.*"
    safety: safe
    confidence: 95
    explanation: "Sublime Text caches. Recreated by the editor without affecting project files."
    source:
      name: Sublime Text
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - editor
      - cache
