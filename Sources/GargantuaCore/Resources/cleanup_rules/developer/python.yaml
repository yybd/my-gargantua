rules:
  - id: python_venv
    name: Python Virtual Environments
    paths:
      - "**/.venv"
      - "**/venv"
    safety: review
    confidence: 80
    explanation: "Python virtual environment. Restored with 'python -m venv' + 'pip install -r requirements.txt'."
    source:
      name: Python
    regenerates: true
    regenerate_command: "python -m venv .venv && pip install -r requirements.txt"
    category: dev_artifacts
    tags:
      - developer
      - python
      - dependencies
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 95
        explanation_suffix: "No project activity in 30+ days. Restore with venv + pip install."
        profiles:
          - developer
      - condition: "age > 7d"
        safety: safe
        confidence: 90
        explanation_suffix: "Inactive for over a week."
        profiles:
          - deep

  - id: python_pycache
    name: Python __pycache__
    paths:
      - "**/__pycache__"
    safety: safe
    confidence: 98
    explanation: "Compiled Python bytecode. Regenerated automatically on next import."
    source:
      name: Python
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: python_pytest_cache
    name: pytest Cache
    paths:
      - "**/.pytest_cache"
      - "~/.pytest_cache"
    safety: safe
    confidence: 97
    explanation: "pytest test cache. Regenerated on next run."
    source:
      name: pytest
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: python_mypy_cache
    name: mypy Cache
    paths:
      - "**/.mypy_cache"
      - "~/.cache/mypy"
    safety: safe
    confidence: 97
    explanation: "mypy incremental type-check cache. Regenerated on next run."
    source:
      name: mypy
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: python_ruff_cache
    name: Ruff Cache
    paths:
      - "**/.ruff_cache"
      - "~/.cache/ruff"
    safety: safe
    confidence: 98
    explanation: "Ruff linter cache. Regenerated on next run."
    source:
      name: Ruff
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: python_tox
    name: tox Environments
    paths:
      - "**/.tox"
    safety: review
    confidence: 85
    explanation: "tox test-matrix environments. Recreated on next 'tox' run, which takes time."
    source:
      name: tox
    regenerates: true
    regenerate_command: "tox"
    category: dev_artifacts
    tags:
      - developer
      - python
      - build_cache
    safety_overrides:
      - condition: "age > 14d"
        safety: safe
        confidence: 92
        explanation_suffix: "No tox activity in 2+ weeks."
        profiles:
          - developer
          - deep

  - id: pip_cache
    name: pip Cache
    paths:
      - "~/Library/Caches/pip"
    safety: safe
    confidence: 98
    explanation: "pip wheel cache. Re-downloaded from PyPI as needed."
    source:
      name: pip
    regenerates: true
    regenerate_command: "pip cache purge"
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: pipx_cache
    name: pipx Cache
    paths:
      - "~/.cache/pipx"
    safety: safe
    confidence: 97
    explanation: "pipx download/build cache. Rebuilt on next install."
    source:
      name: pipx
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: pyenv_cache
    name: pyenv Cache
    paths:
      - "~/.pyenv/cache"
    safety: safe
    confidence: 97
    explanation: "pyenv source and binary download cache. Re-downloaded when installing Python versions."
    source:
      name: pyenv
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: poetry_cache
    name: Poetry Cache
    paths:
      - "~/Library/Caches/pypoetry"
      - "~/.cache/poetry"
    safety: safe
    confidence: 97
    explanation: "Poetry dependency cache. Re-downloaded as needed."
    source:
      name: Poetry
    regenerates: true
    regenerate_command: "poetry cache clear --all ."
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: uv_cache
    name: uv Cache
    paths:
      - "~/Library/Caches/uv"
      - "~/.cache/uv"
    safety: safe
    confidence: 97
    explanation: "uv package installer cache. Re-downloaded as needed."
    source:
      name: uv
    regenerates: true
    regenerate_command: "uv cache clean"
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: jupyter_runtime_cache
    name: Jupyter Runtime Cache
    paths:
      - "~/.jupyter/runtime"
    safety: safe
    confidence: 95
    explanation: "Jupyter runtime sockets and transient kernel files. Recreated when Jupyter starts."
    source:
      name: Jupyter
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: huggingface_cache
    name: Hugging Face Cache
    paths:
      - "~/.cache/huggingface"
    safety: review
    confidence: 82
    explanation: "Downloaded Hugging Face models and datasets. Re-downloadable, but often large and useful offline."
    source:
      name: Hugging Face
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - ai
      - cache
    safety_overrides:
      - condition: "age > 60d"
        safety: safe
        confidence: 90
        explanation_suffix: "No model-cache activity in 60+ days."
        profiles:
          - developer
          - deep

  - id: python_ml_framework_caches
    name: Python ML Framework Caches
    paths:
      - "~/.cache/torch"
      - "~/.cache/tensorflow"
    safety: review
    confidence: 82
    explanation: "PyTorch and TensorFlow framework caches. Re-downloadable, but may contain large model/data artifacts useful offline."
    source:
      name: Python ML frameworks
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - ai
      - cache
    safety_overrides:
      - condition: "age > 60d"
        safety: safe
        confidence: 90
        explanation_suffix: "No ML-cache activity in 60+ days."
        profiles:
          - developer
          - deep

  - id: conda_package_cache
    name: Conda Package Cache
    paths:
      - "~/.conda/pkgs"
      - "~/anaconda3/pkgs"
      - "~/miniconda3/pkgs"
    safety: safe
    confidence: 94
    explanation: "Conda package tarballs and extracted package cache. Environments remain, packages re-download as needed."
    source:
      name: Conda
    regenerates: true
    regenerate_command: "conda clean --packages --tarballs"
    category: dev_artifacts
    tags:
      - developer
      - python
      - cache

  - id: wandb_cache
    name: Weights & Biases Cache
    paths:
      - "~/.cache/wandb"
    safety: review
    confidence: 80
    explanation: "Weights & Biases cached run artifacts. Usually re-syncable, but may include offline experiment data."
    source:
      name: Weights & Biases
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - python
      - ai
      - cache
