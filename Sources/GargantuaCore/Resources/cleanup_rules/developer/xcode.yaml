rules:
  - id: xcode_derived_data
    name: Xcode Derived Data
    paths:
      - "~/Library/Developer/Xcode/DerivedData"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: safe
    confidence: 98
    explanation: "Build intermediates and indexes. Rebuilt automatically on next build."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    regenerate_command: "xcodebuild"
    category: dev_artifacts
    tags:
      - developer
      - build_cache
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 99
        explanation_suffix: "No build activity in 30+ days. Project likely inactive."
        profiles:
          - developer
          - deep

  - id: xcode_archives
    name: Xcode Archives
    paths:
      - "~/Library/Developer/Xcode/Archives"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: review
    confidence: 70
    explanation: "App archives used for distribution. May be needed for crash symbolication."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    regenerate_command: "xcodebuild archive"
    category: dev_artifacts
    tags:
      - developer
      - archives
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 85
        explanation_suffix: "Archive older than 90 days — unlikely needed for symbolication."
        profiles:
          - developer
          - deep

  - id: xcode_simulators
    name: iOS Simulator Data
    paths:
      - "~/Library/Developer/CoreSimulator/Devices"
    exclude:
      - "*/device.plist"
    skip_if_process_running:
      - com.apple.CoreSimulator.CoreSimulatorService
      - Simulator
    safety: review
    confidence: 75
    explanation: "Simulator device data including installed apps. Can be recreated but takes time."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - simulators
    safety_overrides:
      - condition: "age > 60d"
        safety: safe
        confidence: 90
        explanation_suffix: "Simulator unused for 60+ days."
        profiles:
          - developer
          - deep

  - id: xcode_caches
    name: Xcode Caches
    paths:
      - "~/Library/Caches/com.apple.dt.Xcode"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: safe
    confidence: 97
    explanation: "Xcode internal caches. Rebuilt automatically."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - cache

  - id: xcode_previews
    name: SwiftUI Previews Cache
    paths:
      - "~/Library/Developer/Xcode/UserData/Previews"
    safety: safe
    confidence: 97
    explanation: "SwiftUI preview build artifacts. Regenerated when previews are used."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - cache

  - id: xcode_core_simulator_caches
    name: CoreSimulator Caches
    paths:
      - "~/Library/Developer/CoreSimulator/Caches"
      - "~/Library/Developer/CoreSimulator/Devices/*/data/tmp"
      - "~/Library/Developer/CoreSimulator/Profiles/Runtimes/*/Contents/Resources/RuntimeRoot/System/Library/Caches"
    skip_if_process_running:
      - com.apple.CoreSimulator.CoreSimulatorService
      - Simulator
    safety: safe
    confidence: 94
    explanation: "CoreSimulator cache and temp files. Simulators rebuild them when launched."
    source:
      name: Xcode Simulator
      bundle_id: com.apple.iphonesimulator
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - simulators
      - cache
      - temp

  - id: xcode_core_simulator_logs
    name: CoreSimulator Logs
    paths:
      - "~/Library/Logs/CoreSimulator"
    safety: safe
    confidence: 97
    explanation: "CoreSimulator logs. Useful for debugging only and regenerated by simulator services."
    source:
      name: Xcode Simulator
      bundle_id: com.apple.iphonesimulator
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - simulators
      - logs

  - id: xcode_device_logs
    name: Xcode Device Logs
    paths:
      - "~/Library/Developer/Xcode/iOS Device Logs"
      - "~/Library/Developer/Xcode/watchOS Device Logs"
    safety: safe
    confidence: 96
    explanation: "Device logs collected by Xcode. They do not affect connected devices or build outputs."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - logs

  - id: xcode_build_products
    name: Xcode Build Products
    paths:
      - "~/Library/Developer/Xcode/Products"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: safe
    confidence: 92
    explanation: "Xcode build products outside project folders. Recreated by future builds."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    regenerate_command: "xcodebuild"
    category: dev_artifacts
    tags:
      - developer
      - build_cache

  - id: xcode_documentation_caches
    name: Xcode Documentation Caches
    paths:
      - "~/Library/Developer/Xcode/DocumentationCache"
      - "~/Library/Developer/Xcode/DocumentationIndex"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: safe
    confidence: 93
    explanation: "Downloaded and indexed Xcode documentation cache. Rebuilt when documentation is opened."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - cache

  - id: xcode_interface_builder_cache
    name: Xcode Interface Builder Cache
    paths:
      - "~/Library/Developer/Xcode/UserData/IB Support"
    skip_if_process_running:
      - com.apple.dt.Xcode
      - Xcode
    safety: safe
    confidence: 95
    explanation: "Interface Builder support cache. Recreated by Xcode when storyboards or nibs are edited."
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
      verify_signature: true
    regenerates: true
    category: dev_artifacts
    tags:
      - developer
      - cache
