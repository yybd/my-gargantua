rules:
  - id: docker_cache
    name: Docker Build Cache
    paths:
      - "~/Library/Containers/com.docker.docker/Data/vms"
    safety: review
    confidence: 80
    explanation: "Docker VM disk images containing layers and build cache. Can be large."
    source:
      name: Docker Desktop
      bundle_id: com.docker.docker
      verify_signature: true
    regenerates: true
    regenerate_command: "docker system prune"
    category: docker
    tags:
      - developer
      - containers
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 90
        explanation_suffix: "Docker unused for 30+ days. Images can be re-pulled."
        profiles:
          - developer
          - deep

  - id: docker_data
    name: Docker Application Data
    paths:
      - "~/Library/Containers/com.docker.docker/Data"
    exclude:
      - "*/vms"
    safety: review
    confidence: 75
    explanation: "Docker configuration and state data. Volumes may contain important data."
    source:
      name: Docker Desktop
      bundle_id: com.docker.docker
      verify_signature: true
    regenerates: false
    category: docker
    tags:
      - developer
      - containers

  - id: docker_log
    name: Docker Logs
    paths:
      - "~/Library/Containers/com.docker.docker/Data/log"
    safety: safe
    confidence: 95
    explanation: "Docker daemon logs. No operational impact from removal."
    source:
      name: Docker Desktop
      bundle_id: com.docker.docker
      verify_signature: true
    regenerates: true
    category: docker
    tags:
      - developer
      - logs

  - id: docker_buildx_cache
    name: Docker Buildx Cache
    paths:
      - "~/.docker/buildx/cache"
    safety: safe
    confidence: 95
    explanation: "Docker Buildx local build cache. Layers can be rebuilt or pulled again."
    source:
      name: Docker Buildx
    regenerates: true
    regenerate_command: "docker buildx prune"
    category: docker
    tags:
      - developer
      - containers
      - cache

  - id: container_storage_temp
    name: Container Storage Temp
    paths:
      - "~/.local/share/containers/storage/tmp"
    safety: safe
    confidence: 95
    explanation: "Podman/container-storage temporary files. Recreated by container tooling when needed."
    source:
      name: containers/storage
    regenerates: true
    category: docker
    tags:
      - developer
      - containers
      - temp
