rules:
  - id: chrome_cache
    name: Chrome Browser Cache
    paths:
      - "~/Library/Caches/Google/Chrome"
      - "~/Library/Caches/Google/Chrome/Default/Cache"
    safety: safe
    confidence: 98
    explanation: "Browser cache files regenerated automatically on next visit. No user data lost."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 99
        explanation_suffix: "Cache untouched for 30+ days — very safe to remove."
        profiles:
          - developer
          - deep

  - id: chrome_code_cache
    name: Chrome Code Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Code Cache"
    safety: safe
    confidence: 97
    explanation: "Compiled JavaScript/WebAssembly cache. Rebuilt transparently on revisit."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache

  - id: chrome_service_worker
    name: Chrome Service Worker Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Service Worker"
    safety: safe
    confidence: 95
    explanation: "Service worker and CacheStorage data. Sites re-download on next visit."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache

  - id: chrome_local_storage
    name: Chrome Local Storage
    paths:
      - "~/Library/Application Support/Google/Chrome/Default/Local Storage"
    safety: review
    confidence: 75
    explanation: "Website local storage may contain login tokens and preferences. Review before removing."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: false
    category: browser_data
    tags:
      - browser
      - user_data
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 85
        explanation_suffix: "No browser activity in 90+ days — likely abandoned site data."
        profiles:
          - deep

  - id: chrome_extensions_cache
    name: Chrome Extensions Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Extensions"
    safety: safe
    confidence: 90
    explanation: "Cached extension assets. Extensions re-download from Chrome Web Store."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - extensions
      - cache
