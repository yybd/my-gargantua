# Tenet Configuration
# Generated by tenet-toolchain-setup v1.0.0
# Date: 2026-04-24T21:12:00Z

[project]
slug = "gargantua"
name = "Gargantua"
repo_url = "git@github.com:inceptyon-labs/gargantua.git"

[toolchain]
# "auto"     = run if installed, skip silently if not
# "required" = fail the toolchain run if this tool is missing
# "off"      = never run, even if installed

# ── Secrets ────────────────────────────────────────────────────────────────
# gitleaks config found at .gitleaks.toml
gitleaks    = "required"
semgrep     = "auto"
trufflehog  = "auto"

# ── Dependency scanning ────────────────────────────────────────────────────
# trivy can scan Package.resolved for Swift dependency CVEs.
# trivy.yaml excludes SwiftPM build artifacts under .build.
trivy       = "auto"
osv_scanner = "auto"    # OSV-backed Package.resolved coverage
npm_audit   = "off"     # no package.json
pip_audit   = "off"     # no Python source

# ── Swift linting / formatting ─────────────────────────────────────────────
# swiftlint config found at .swiftlint.yml
swiftlint   = "required"
swiftformat = "auto"

# ── Docs ───────────────────────────────────────────────────────────────────
markdownlint = "auto"

# ── Not applicable for this project ───────────────────────────────────────
eslint      = "off"     # no JS/TS
radon       = "off"     # no Python
gocyclo     = "off"     # no Go
hadolint    = "off"     # no Dockerfile
actionlint  = "off"     # no .github/workflows
axe         = "off"     # no web UI
pa11y       = "off"     # no web UI
tflint      = "off"     # no Terraform

[weights]
security     = 1.5
secrets      = 1.5
dependencies = 1.3
errors       = 1.3
solid        = 1.1
complexity   = 1.1
debt         = 1.1
testing      = 1.1
performance  = 1.0
api_contract = 1.0
observability = 1.0
build_ci     = 1.0
docs         = 0.8
accessibility = 0.8

[dimensions]
# Accessibility and web-specific dimensions are not applicable for this macOS app
accessibility = "off"
api_contract  = "off"   # no REST/GraphQL/tRPC API surface
# All other dimensions active
