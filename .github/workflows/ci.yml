name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rules-drift:
    name: Rule Snapshot Drift
    # Only needs git + python3 to diff the bundled snapshot against the
    # gargantua-rules source of truth, so a cheap Linux runner is enough.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify bundled rules match their recorded upstream commit
        run: Scripts/sync-rules.sh check

  lint:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint and SwiftFormat
        run: brew install swiftlint swiftformat

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Run SwiftFormat (lint)
        run: swiftformat --lint .

  test:
    name: Swift Tests
    # macos-15 with the latest stable Xcode is required: a transitive
    # SwiftPM dependency (mlx-swift-lm) declares
    # `// swift-tools-version: 6.1`, which needs Xcode 16.3+ /
    # Swift 6.1+. The default macos-14 runner ships Xcode 15 / Swift
    # 5.10 and fails dependency resolution.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      # mlx-swift's BuildMetallibPlugin shells out to `xcrun metal` to
      # compile its shaders; the macos-15 runner doesn't ship the Metal
      # Toolchain by default, so the prebuild step fails before any test
      # gets to run. Download the component once per job — output is a
      # silent install, exit-coded.
      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export lcov
        run: |
          test_binary=".build/debug/GargantuaPackageTests.xctest/Contents/MacOS/GargantuaPackageTests"
          if [[ ! -x "$test_binary" ]]; then
            test_binary="$(find .build/debug -path '*.xctest/Contents/MacOS/*' -type f | head -n 1)"
          fi
          if [[ -z "$test_binary" || ! -x "$test_binary" ]]; then
            echo "Unable to locate SwiftPM test executable under .build/debug" >&2
            exit 1
          fi

          xcrun llvm-cov export \
            -format=lcov \
            "$test_binary" \
            -instr-profile .build/debug/codecov/default.profdata \
            -ignore-filename-regex='.build|Tests' > coverage.lcov

      - name: Enforce coverage floor (78%)
        run: Scripts/coverage-priorities.sh coverage.lcov --fail-under 78

      - name: Summarize low-coverage service and model files
        run: Scripts/coverage-priorities.sh coverage.lcov --limit 20 --min-lines 20

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
