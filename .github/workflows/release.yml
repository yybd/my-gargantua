name: Release

# Two ways to fire this workflow:
#   1. Push a `vX.Y.Z` tag → real release: build, sign, notarize, publish.
#   2. Manual `workflow_dispatch` → defaults to dry-run + snapshot, useful
#      for verifying the secrets are wired without shipping anything.
#
# Distribution layout (matches the `freeport` cask convention):
#
#   - DMG + appcast.xml → uploaded to gargantua's own GitHub Release
#   - Casks/gargantua.rb → committed in inceptyon-labs/homebrew-tap,
#     cask URL points back at gargantua's release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only: build pipeline, no real codesign/notarize, no publish'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-15
    timeout-minutes: 60

    env:
      KEYCHAIN_NAME: gargantua-release.keychain-db
      TAP_REPO: inceptyon-labs/homebrew-tap

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required by _env.sh — `git rev-list --count`
          # produces CFBundleVersion, and `git describe` resolves the tag.
          fetch-depth: 0

      - name: Select latest stable Xcode (Swift 6.1+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve mode + version
        # Sets:
        #   IS_DRY_RUN: 'true' for workflow_dispatch with dry_run=true (default)
        #   RELEASE_FLAGS: flags to pass to ./Scripts/release.sh
        #   VERSION: cleaned-up version string (no leading 'v')
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY="${{ github.event.inputs.dry_run }}"
            if [ "$DRY" = "true" ]; then
              echo "IS_DRY_RUN=true" >> "$GITHUB_ENV"
              echo "RELEASE_FLAGS=--ci --dry-run --snapshot" >> "$GITHUB_ENV"
              SHORT_SHA=$(git rev-parse --short HEAD)
              echo "VERSION=0.0.0-${SHORT_SHA}" >> "$GITHUB_ENV"
            else
              # Manual non-dry-run requires a tag on HEAD.
              if ! git describe --tags --exact-match HEAD >/dev/null 2>&1; then
                echo "::error::workflow_dispatch dry_run=false requires HEAD to be on a vX.Y.Z tag" >&2
                exit 1
              fi
              echo "IS_DRY_RUN=false" >> "$GITHUB_ENV"
              echo "RELEASE_FLAGS=--ci" >> "$GITHUB_ENV"
              VERSION=$(git describe --tags --exact-match HEAD)
              VERSION="${VERSION#v}"
              echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            fi
          else
            echo "IS_DRY_RUN=false" >> "$GITHUB_ENV"
            echo "RELEASE_FLAGS=--ci" >> "$GITHUB_ENV"
            VERSION="${GITHUB_REF_NAME#v}"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Compute URL prefix for appcast
        run: |
          set -euo pipefail
          PREFIX="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/"
          echo "SPARKLE_DOWNLOAD_URL_PREFIX=$PREFIX" >> "$GITHUB_ENV"

      - name: Resolve SwiftPM dependencies
        # Materialises Sparkle's generate_appcast under .build/artifacts.
        run: swift package resolve

      - name: Set up signing keychain
        if: env.IS_DRY_RUN != 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/devid.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/$KEYCHAIN_NAME"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          ORIGINAL_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | xargs)
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      - name: Write App Store Connect API key
        if: env.IS_DRY_RUN != 'true'
        env:
          API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/notary-api.p8"
          echo "$API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "NOTARY_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Write Sparkle EdDSA private key
        if: env.IS_DRY_RUN != 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/sparkle-ed.key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "SPARKLE_ED_KEY_FILE=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Inherit previous appcast (cumulative entries)
        # Best-effort: if a prior release exists, generate_appcast appends
        # to that file. A 404 just means this is the first release.
        run: |
          set -euo pipefail
          mkdir -p dist/sparkle-updates
          PREV_URL="https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml"
          if curl -sLfo dist/sparkle-updates/appcast.xml "$PREV_URL"; then
            echo "Inherited previous appcast from $PREV_URL"
          else
            echo "No previous appcast (first release or network blip)"
          fi

      - name: Run release pipeline
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
          NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ISSUER_ID }}
          # NOTARY_API_KEY_PATH, SPARKLE_ED_KEY_FILE, SPARKLE_DOWNLOAD_URL_PREFIX, RELEASE_FLAGS
          # are set in earlier steps via $GITHUB_ENV.
        run: ./Scripts/release.sh ${{ env.RELEASE_FLAGS }}

      - name: Compute DMG SHA256 + stage release notes
        if: env.IS_DRY_RUN != 'true'
        run: |
          set -euo pipefail
          DMG="dist/Gargantua-${VERSION}.dmg"
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "DMG_SHA256=$SHA256" >> "$GITHUB_ENV"

          NOTES="dist/sparkle-updates/Gargantua-${VERSION}.dmg.md"
          if [ ! -f "$NOTES" ]; then
            printf '# Gargantua %s\n\nSee CHANGELOG.md for details.\n' "$VERSION" > "$NOTES"
          fi
          echo "RELEASE_NOTES_PATH=$NOTES" >> "$GITHUB_ENV"

      - name: Detect Homebrew tap token presence
        if: env.IS_DRY_RUN != 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN_PRESENT=true" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release (DMG + appcast)
        if: env.IS_DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --title "Gargantua ${VERSION}" \
            --notes-file "$RELEASE_NOTES_PATH" \
            "dist/Gargantua-${VERSION}.dmg" \
            "dist/sparkle-updates/appcast.xml"

      - name: Bump Homebrew tap formula
        if: env.IS_DRY_RUN != 'true' && env.HOMEBREW_TAP_TOKEN_PRESENT == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"

          mkdir -p "$TAP_DIR/Casks"
          ./Scripts/release/render-cask.sh \
            --version "$VERSION" \
            --sha256 "$DMG_SHA256" \
            --repo "${{ github.repository }}" \
            > "$TAP_DIR/Casks/gargantua.rb"

          cd "$TAP_DIR"
          git config user.name "gargantua-release-bot"
          git config user.email "release@inceptyon-labs.invalid"
          git add Casks/gargantua.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date for $VERSION"
          else
            git commit -m "Update gargantua to $VERSION"
            git push origin HEAD
          fi

      - name: Tear down signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/$KEYCHAIN_NAME" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notary-api.p8" "$RUNNER_TEMP/sparkle-ed.key"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ env.VERSION }}
          path: |
            dist/notarize-*.json
            dist/sparkle-updates/
          if-no-files-found: ignore
          retention-days: 7
